<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pizza de calabresa</title>
    <style>
        * {
            font-family: 'Comic Sans MS';
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 100px repeat(4, 500px);
            margin: 0;
            overflow-x: hidden;
        }
        
        header {
            text-align: center; 
            align-content: center;
            background-color: green;
            color: #fff;
            font-size: 24px;
        }

        .header-transitions {
            grid-column: 1 / 2;
        }

        .header-animations {
            grid-column: 2 / 3;
        }

        article {
            position: relative;
            overflow: hidden; 
        }
        
        img {
            position: absolute;
            max-width: 100%;
            max-height: 100%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transform-origin: center;
        }

        /* Transições */
        .t1 {
            background-color: gold;
        }
        .t1 img {
            transition: transform 1s ease-in-out 0s;
        }
        .t1 img:hover {
            transform: translate(-50%, -50%) rotate(180deg);
        }

        .t2 {
            background-color: rgb(157, 157, 157);
        }
        .t2 img {
            transition: transform 1s ease-in-out 0.2s;
        }
        .t2 img:hover {
            transform: translate(-50%, -50%) rotateZ(360deg);
        }

        .t3 {
            background-color: #e7e662;
        }
        .t3 img {
            transition: transform 1s ease-in-out 0.4s;
            width: 100%;
        }
        .t3 img:hover{
            transform: translate(-50%, -50%) skew(30deg);
        }

        .t4 {
            background-color: red;
        }
        .t4 img {
            transition: transform 0.5s ease-in-out 0.1s;
        }
        .t4 img:hover {
            transform: translate(-50%, -25%);
        }
        
        /* Animações */
        .a1 img {
            animation: slide-in 2s ease-in-out infinite alternate;
            width: 100%;
            height: 100%;
            top: 0;
        }

        .a1{
            background-color: black;
        }

        .a2 {
            background-color: #ffb347;
        }

        .a2:hover{
            background-color: #fdff75
        }
        .a2 img {
            animation: girar 2s linear infinite;
        }

        .a3 {
            background-color: black; /* Roxo */
        }
        .a3 img {
            animation: punicao 3s steps(60) 0s infinite alternate both;
        }

        .a4 {
            background-color: rgb(71, 188, 71); /* Verde */
        }
        .a4 img {
            animation: mudarCor 3s linear infinite alternate;
            width: 50%;
        }
        
        /* Keyframes para animações */
        @keyframes slide-in {
            from 
            {
                transform: translateX(-150%);
            }
            to 
            {
                transform: translateX(-50%);
            }
        }
        
        @keyframes girar {
            0% {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            100% {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }
        
        @keyframes pular {
            0%, 100% {
                transform: translate(-50%, -50%) translateY(0);
            }
            50% {
                transform: translate(-50%, -60%);
            }
        }
        
        @keyframes mudarCor {
            0% {
                filter: hue-rotate(0deg);
            }
            50% {
                filter: hue-rotate(180deg);
            }
            100% {
                filter: hue-rotate(360deg);
            }
        }

        @keyframes punicao{
            0%{content: url("img/gojo-nah.webp.webp");
                opacity: 1;}
            50%{opacity: 0;}
            100%{content: url("img/gojo-dead.webp.webp"); opacity: 1;}

        }
    </style>
</head>
<body>
    <header class="header-transitions">Transições</header>
    <header class="header-animations">Animações</header>

    <article class="t1">
        <img src="img/01hzavjrtmb4jqxp7r06.webp" class="img">
    </article>
    <article class="a1">
        <img src="img/images.jpg" class="img">
    </article>
    <article class="t2">
        <img src="img/vergil_chair.jpg" class="img">
    </article>
    <article class="a2">
        <img src="img/Png.png" class="img">
    </article>
    <article class="t3">
        <img src="img/sorrizoronaldo.jpg" class="img">
    </article>
    <article class="a3">
        <img>
    </article>
    <article class="t4">
        <img src="img/c3738446f2b6a38d7abcb4275d270716.jpg" class="img">
    </article>
    <article class="a4">
        <img src="img/a7031195e2b76afad686a3579ab3030c.jpg" class="img">
    </article>
</body>
</html>
