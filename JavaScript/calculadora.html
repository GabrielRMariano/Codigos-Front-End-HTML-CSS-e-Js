<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background: linear-gradient(135deg,#141414,#2b2b2b);
        }

        div{
            background:#1e1e1e;
            padding:25px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,0.6);
        }

        #view{
            width:100%;
            height:60px;
            background:#0f0f0f;
            color:#00ff9d;
            font-size:28px;
            display:flex;
            align-items:center;
            justify-content:flex-end;
            padding:10px;
            border-radius:10px;
            margin-bottom:15px;
            letter-spacing:1px;
        }

        table{
            width:100%;
            border-spacing:10px;
        }

        button{
            width:60px;
            height:60px;
            border:none;
            border-radius:10px;
            font-size:18px;
            background:#2f2f2f;
            color:white;
            cursor:pointer;
            transition:0.2s;
        }

        button:hover{
            background:#3f3f3f;
            transform:scale(1.05);
        }

        button:active{
            transform:scale(0.95);
        }

        /* operadores */
        button[onclick*="op"]{
            background:#ff9500;
        }

        button[onclick*="op"]:hover{
            background:#ffae33;
        }

        /* botão igual */
        button[onclick="equals()"]{
            background:#00c853;
        }

        button[onclick="equals()"]:hover{
            background:#1de96c;
        }

        /* botão clear */
        button[onclick="clearview()"]{
            background:#d50000;
        }

        button[onclick="clearview()"]:hover{
            background:#ff2a2a;
        }
    </style>
</head>
<body>
    <script>
        let numAtual=0;
        let memoria = 0;
        let ultima_op = null;
        function digitacao(num) {
            numAtual = numAtual*10 + num;
            document.getElementById("view").innerHTML = numAtual;
        }

        function op(operacao) {
            if (ultima_op != null) {
                memoria = ultima_op();
            } else {
                memoria = numAtual;
            }
            if (operacao=='sum')
                ultima_op = () => memoria + numAtual;
            else if (operacao=='sub')
                ultima_op = () => memoria - numAtual;
            else if (operacao=='mult')
                ultima_op = () => memoria * numAtual;
            else
                ultima_op = () => memoria / numAtual;
            numAtual = 0;
            document.getElementById("view").innerHTML = memoria;
        }

        function equals() {
            if (ultima_op != null) {
                numAtual = ultima_op();
                document.getElementById("view").innerHTML = numAtual;
                ultima_op = null;
                memoria = numAtual;
            }
        }

        function clearview() {
            numAtual = 0;
            memoria = 0;
            ultima_op = null;
            document.getElementById("view").innerHTML = numAtual;
        }
    </script>
    <div>
        <p id="view">0</p>
        <table>
            <tr>
                <td> <button onclick="digitacao(7)">7</button> </td>
                <td> <button onclick="digitacao(8)">8</button> </td>
                <td> <button onclick="digitacao(9)">9</button> </td>
                <td> <button onclick="op('div')">/</button> </td>
            </tr>
            <tr>
                <td> <button onclick="digitacao(4)">4</button> </td>
                <td> <button onclick="digitacao(5)">5</button> </td>
                <td> <button onclick="digitacao(6)">6</button> </td>
                <td> <button onclick="op('mult')">*</button> </td>
            </tr>
            <tr>
                <td> <button onclick="digitacao(1)">1</button> </td>
                <td> <button onclick="digitacao(2)">2</button> </td>
                <td> <button onclick="digitacao(3)">3</button> </td>
                <td> <button onclick="op('sub')">-</button> </td>
            </tr>
            <tr>
                <td> <button onclick="clearview()">C</button> </td>
                <td> <button onclick="digitacao(0)">0</button> </td>
                <td> <button onclick="equals()">=</button> </td>
                <td> <button onclick="op('sum')">+</button> </td>
            </tr>
        </table>
    </div>
</body>
</html>
